      "blocked_by": ["G-01", "G-02", "G-03", "G-04", "G-06"],
      "body": "## Outcome\nOn-call operators can detect, triage, and recover MVP failures, and release owners have auditable launch evidence.\n\n## Scope\nCreate actionable alerts and dashboards for API, database, storage, queue, workers, imports, exports, conflicts, and contract failures; write incident, rollback, secret rotation, data recovery, and dependency-outage runbooks; automate the production-shaped GPX-to-export E2E and release checklist.\n\n## Acceptance criteria\n- [ ] Alert tests reach the correct owner and link to exercised runbooks.\n- [ ] The production-shaped E2E covers sign-in, upload, import, view, edit, publish, export, download, duplicate, conflict, failure, and unauthorized paths.\n- [ ] Every release criterion has recorded evidence, owner approval, or an explicit launch block.\n\n<!-- haiker-issue-id: G-07 -->"
