# pg_hba.conf - Backup-aware PostgreSQL client authentication
#
# WARNING: This file REPLACES the default pg_hba.conf when used with the
# docker-compose.backup.yml hba_file directive. It must include ALL authentication
# rules needed for production operation, not just backup-specific rules.
#
# If you have custom production HBA rules, add them to the "Production rules"
# section below. This file is the SOLE source of HBA configuration when the
# backup compose overlay is active.
#
# See: https://www.postgresql.org/docs/current/auth-pg-hba-conf.html

# TYPE  DATABASE        USER                ADDRESS         METHOD

# =============================================================================
# Backup-specific rules (required for backup infrastructure)
# =============================================================================

# Allow backup user replication connections from the Docker network
host    replication     backup_user         172.16.0.0/12   scram-sha-256

# Allow backup user to connect for pg_basebackup metadata queries
host    all             backup_user         172.16.0.0/12   scram-sha-256

# =============================================================================
# Production rules (add your application-specific rules here)
# These rules replicate what your default pg_hba.conf provides.
# =============================================================================

# Allow all authenticated users from Docker networks (default compose behavior)
host    all             all                 172.16.0.0/12   scram-sha-256

# Local unix socket connections (container-internal)
local   all             all                                 peer
