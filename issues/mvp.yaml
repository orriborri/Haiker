      "blocked_by": ["G-05"],
      "body": "## Outcome\nOperators have successfully restored a coherent Haiker environment and know how to recover from data or migration failure.\n\n## Scope\nDocument and execute a full restore drill covering database PITR, object versions, checksums, cross-context integrity, secrets, deployment, migration rollback/forward recovery, smoke tests, and provisional four-hour RTO measurement.\n\n## Acceptance criteria\n- [ ] A clean isolated environment restores authoritative state and critical artifacts successfully.\n- [ ] Integrity checks confirm activities, recorded routes, published versions, current pointers, audit records, and artifacts are coherent.\n- [ ] Measured RPO/RTO, gaps, owners, and remediation are recorded and approved before launch.\n\n<!-- haiker-issue-id: G-06 -->"
