openapi: "3.1.1"
info:
  title: Haiker API
  version: "1.0.0"
  description: Hiking route management API with social features, route planning, and activity tracking.
servers:
  - url: /v1
security:
  - bearerAuth: []
  - cookieAuth: []
paths:
  /health:
    $ref: "paths/health.yaml#/~1health"
  /ready:
    $ref: "paths/health.yaml#/~1ready"
  /auth/login:
    $ref: "paths/auth.yaml#/~1auth~1login"
  /auth/callback:
    $ref: "paths/auth.yaml#/~1auth~1callback"
  /auth/logout:
    $ref: "paths/auth.yaml#/~1auth~1logout"
  /v1/me:
    $ref: "paths/auth.yaml#/~1v1~1me"
  /v1/imports:
    $ref: "paths/imports.yaml#/~1v1~1imports"
  /v1/imports/{importId}/completion:
    $ref: "paths/imports.yaml#/~1v1~1imports~1{importId}~1completion"
  /v1/imports/{importId}:
    $ref: "paths/imports.yaml#/~1v1~1imports~1{importId}"
  /v1/activities:
    $ref: "paths/activities.yaml#/~1v1~1activities"
  /v1/activities/{activityId}/current-route-version:
    $ref: "paths/activities.yaml#/~1v1~1activities~1{activityId}~1current-route-version"
  /v1/activities/{activityId}/route-drafts:
    $ref: "paths/route-editing.yaml#/~1v1~1activities~1{activityId}~1route-drafts"
  /v1/route-drafts/{draftId}:
    $ref: "paths/route-editing.yaml#/~1v1~1route-drafts~1{draftId}"
  /v1/route-drafts/{draftId}/operations:
    $ref: "paths/route-editing.yaml#/~1v1~1route-drafts~1{draftId}~1operations"
  /v1/route-drafts/{draftId}/undo:
    $ref: "paths/route-editing.yaml#/~1v1~1route-drafts~1{draftId}~1undo"
  /v1/route-drafts/{draftId}/redo:
    $ref: "paths/route-editing.yaml#/~1v1~1route-drafts~1{draftId}~1redo"
  /v1/route-drafts/{draftId}/reset:
    $ref: "paths/route-editing.yaml#/~1v1~1route-drafts~1{draftId}~1reset"
  /v1/route-drafts/{draftId}/validation:
    $ref: "paths/route-editing.yaml#/~1v1~1route-drafts~1{draftId}~1validation"
  /v1/route-drafts/{draftId}/publication:
    $ref: "paths/route-editing.yaml#/~1v1~1route-drafts~1{draftId}~1publication"
  /v1/activities/{activityId}/route-versions:
    $ref: "paths/route-versions.yaml#/~1v1~1activities~1{activityId}~1route-versions"
  /v1/route-versions/{routeVersionId}:
    $ref: "paths/route-versions.yaml#/~1v1~1route-versions~1{routeVersionId}"
  /v1/route-versions/{routeVersionId}/geometry:
    $ref: "paths/route-versions.yaml#/~1v1~1route-versions~1{routeVersionId}~1geometry"
  /v1/activities/{activityId}/exports:
    $ref: "paths/exports.yaml#/~1v1~1activities~1{activityId}~1exports"
  /v1/exports/{exportId}:
    $ref: "paths/exports.yaml#/~1v1~1exports~1{exportId}"
  /v1/exports/{exportId}/download:
    $ref: "paths/exports.yaml#/~1v1~1exports~1{exportId}~1download"
components:
  securitySchemes:
    $ref: "components/security.yaml"
  schemas:
    ProblemDetail:
      $ref: "components/errors.yaml#/ProblemDetail"
    CursorPagination:
      $ref: "components/common.yaml#/CursorPagination"
    ActivitySummary:
      $ref: "components/activities.yaml#/ActivitySummary"
    ActivityListResponse:
      $ref: "components/activities.yaml#/ActivityListResponse"
    SelectCurrentRouteVersionRequest:
      $ref: "components/activities.yaml#/SelectCurrentRouteVersionRequest"
    CreateRouteDraftRequest:
      $ref: "components/route-editing.yaml#/CreateRouteDraftRequest"
    RouteDraftResponse:
      $ref: "components/route-editing.yaml#/RouteDraftResponse"
    ApplyOperationRequest:
      $ref: "components/route-editing.yaml#/ApplyOperationRequest"
    OperationResultResponse:
      $ref: "components/route-editing.yaml#/OperationResultResponse"
    UndoRedoRequest:
      $ref: "components/route-editing.yaml#/UndoRedoRequest"
    PublishRouteDraftRequest:
      $ref: "components/route-editing.yaml#/PublishRouteDraftRequest"
    PublicationResponse:
      $ref: "components/route-editing.yaml#/PublicationResponse"
    RequestExportBody:
      $ref: "components/exports.yaml#/RequestExportBody"
    ExportJobResponse:
      $ref: "components/exports.yaml#/ExportJobResponse"
    ExportStatusResponse:
      $ref: "components/exports.yaml#/ExportStatusResponse"
    ExportDownloadResponse:
      $ref: "components/exports.yaml#/ExportDownloadResponse"
    RouteVersionSummary:
      $ref: "components/route-versions.yaml#/RouteVersionSummary"
    RouteVersionListResponse:
      $ref: "components/route-versions.yaml#/RouteVersionListResponse"
    RouteVersionDetailResponse:
      $ref: "components/route-versions.yaml#/RouteVersionDetailResponse"
    RouteVersionGeometryResponse:
      $ref: "components/route-versions.yaml#/RouteVersionGeometryResponse"
    CorrectedStatistics:
      $ref: "components/route-versions.yaml#/CorrectedStatistics"
