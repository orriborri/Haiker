# PostgreSQL WAL Archiving Configuration for Backup Infrastructure
# This file extends the default PostgreSQL configuration with backup-specific settings.
# Include this via the postgres service command or config volume mount.

# --- WAL Archiving ---
# Enable continuous archiving of WAL segments
wal_level = replica
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
archive_timeout = 300

# --- Checkpoint Settings ---
# Tune checkpoints for a ~15 minute Recovery Point Objective (RPO)
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
max_wal_size = 1GB
min_wal_size = 256MB

# --- Replication Slots (for backup client) ---
max_replication_slots = 2
max_wal_senders = 3
