name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  check:
    name: Check (fmt + clippy)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lints
        run: cargo clippy --all-targets -- -W clippy::all

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: haiker_test
          POSTGRES_USER: haiker
          POSTGRES_PASSWORD: haiker_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U haiker -d haiker_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
          --health-start-period 10s
    env:
      DATABASE_URL: postgres://haiker:haiker_test_password@localhost:5432/haiker_test
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all

  build:
    name: Build (release)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

  openapi:
    name: OpenAPI Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Redocly CLI
        run: npm install -g @redocly/cli

      - name: Bundle and validate OpenAPI spec
        run: bash scripts/bundle-openapi.sh
