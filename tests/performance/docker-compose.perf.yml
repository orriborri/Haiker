services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: haiker_dev
      POSTGRES_USER: haiker
      POSTGRES_PASSWORD: haiker_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U haiker -d haiker_dev"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - perf

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - perf

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/haiker-artifacts --ignore-existing &&
      echo 'Bucket haiker-artifacts created successfully'
      "
    networks:
      - perf

  influxdb:
    image: influxdb:1.8
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb
    networks:
      - perf

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports:
      - "3030:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - influxdb
    networks:
      - perf

  k6:
    image: grafana/k6:latest
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:3000}
      AUTH_TOKEN: ${AUTH_TOKEN:-}
      K6_OUT: influxdb=http://influxdb:8086/k6
    volumes:
      - ./k6:/scripts
      - ./fixtures:/fixtures
      - ./results:/results
    depends_on:
      - influxdb
    networks:
      - perf
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
  minio_data:
  influxdb_data:
  grafana_data:

networks:
  perf:
    driver: bridge
