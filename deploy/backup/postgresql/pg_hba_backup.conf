# pg_hba.conf entries for the backup service user
# Append these rules to the main pg_hba.conf or mount as an additional HBA file.
#
# Only the dedicated backup user is permitted to establish replication connections.
# Access is restricted to the Docker backup network (172.20.0.0/16 covers typical compose networks).

# TYPE  DATABASE        USER                ADDRESS         METHOD

# Allow backup user replication connections from the backup service container
host    replication     backup_user         172.16.0.0/12   scram-sha-256

# Allow backup user to connect to the application database for pg_basebackup metadata
host    all             backup_user         172.16.0.0/12   scram-sha-256
