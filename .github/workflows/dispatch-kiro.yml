name: Dispatch one Kiro issue

on:
  workflow_dispatch:
    inputs:
      issue:
        description: Optional managed issue ID or number; otherwise choose the first safe issue
        required: false
        type: string
      max_concurrency:
        description: Maximum active Kiro or assigned issues allowed (1-10)
        required: true
        default: "1"
        type: string

concurrency:
  group: kiro-issue-dispatch-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  dispatch:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: kiro-dispatch
    env:
      REQUESTED_ISSUE: ${{ inputs.issue }}
      MAX_CONCURRENCY: ${{ inputs.max_concurrency }}
    steps:
      - name: Check out the manifest and scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Verify the connected-user token is configured
        env:
          GH_TOKEN: ${{ secrets.KIRO_GH_TOKEN }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "KIRO_GH_TOKEN must contain a token for a GitHub user connected to Kiro" >&2
            exit 1
          fi

      - name: Synchronize issue dependencies and label definitions
        env:
          GH_TOKEN: ${{ secrets.KIRO_GH_TOKEN }}
        run: scripts/sync-github-issues.sh --apply

      - name: Reconcile the non-triggering readiness queue
        env:
          GH_TOKEN: ${{ secrets.KIRO_GH_TOKEN }}
        run: scripts/label-unblocked-issues.sh --apply

      - name: Dispatch at most one issue
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.KIRO_GH_TOKEN }}
        run: |
          args=(--apply --max-concurrency "$MAX_CONCURRENCY")
          if [[ -n "$REQUESTED_ISSUE" ]]; then
            args+=(--issue "$REQUESTED_ISSUE")
          fi
          scripts/dispatch-kiro-issue.sh "${args[@]}"
