version: "3.8"

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["haiker-api"]
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - RUST_LOG=info
      - LOG_FORMAT=json
      - SERVICE_NAME=haiker-api
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["haiker-worker"]
    env_file:
      - .env
    environment:
      - RUST_LOG=info
      - LOG_FORMAT=json
      - SERVICE_NAME=haiker-worker
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-haiker}
      POSTGRES_USER: ${POSTGRES_USER:-haiker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-haiker_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-haiker} -d ${POSTGRES_DB:-haiker}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_ACCESS_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  minio_data:
